name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Preferred: base64-encoded private key in DEPLOY_SSH_KEY_B64.
          if [ -n "${DEPLOY_SSH_KEY_B64:-}" ]; then
            printf "%s" "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          # Backward compatibility: raw private key in DEPLOY_SSH_KEY.
          elif printf "%s" "$DEPLOY_SSH_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf "%s" "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          else
            printf "%s" "$DEPLOY_SSH_KEY" | sed 's/\\n/\n/g' > ~/.ssh/id_ed25519
          fi

          # Remove CRLF if key was copied from Windows clipboard.
          tr -d '\r' < ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.tmp
          mv ~/.ssh/id_ed25519.tmp ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Pull and restart on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          SSH_OPTS="-i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

          if [ -z "${DEPLOY_ENV_FILE:-}" ]; then
            echo "DEPLOY_ENV_FILE secret is required"
            exit 1
          fi

          # Support both raw multiline .env content and one-line content with escaped \n.
          if printf "%s" "$DEPLOY_ENV_FILE" | grep -q '\\n'; then
            printf "%s" "$DEPLOY_ENV_FILE" | sed 's/\\n/\n/g' > .env.production
          else
            printf "%s" "$DEPLOY_ENV_FILE" > .env.production
          fi
          tr -d '\r' < .env.production > .env.production.tmp
          mv .env.production.tmp .env.production
          chmod 600 .env.production

          ssh $SSH_OPTS -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp $SSH_OPTS -P "$PORT" .env.production "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env.production"
          rm -f .env.production

          ssh $SSH_OPTS -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "set -euo pipefail; \
            cd '$DEPLOY_PATH'; \
            chmod 600 .env.production; \
            git fetch origin main; \
            git checkout main; \
            git pull --ff-only origin main; \
            docker compose --env-file .env.production up -d --build; \
            docker compose --env-file .env.production ps"
